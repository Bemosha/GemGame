<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Car Dodger</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    canvas {
      display: block;
      border-radius: 4px;
    }

    #startScreen, #gameOverScreen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    #startScreen {
      background: rgba(0,0,0,0.85);
    }

    #gameOverScreen {
      background: rgba(0,0,0,0.88);
      display: none;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 16px;
      text-shadow: 0 0 20px rgba(0,150,255,0.6);
    }

    .subtitle {
      font-size: 16px;
      color: #aaa;
      margin-bottom: 30px;
      max-width: 300px;
      line-height: 1.5;
    }

    .btn {
      background: linear-gradient(135deg, #0077ff, #00c6ff);
      color: #fff;
      border: none;
      padding: 14px 40px;
      font-size: 18px;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(0,150,255,0.4);
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(0,150,255,0.6);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .final-score {
      font-size: 60px;
      font-weight: bold;
      color: #00c6ff;
      margin: 10px 0 6px;
    }

    .best-score {
      font-size: 16px;
      color: #888;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div id="startScreen">
    <h1>Car Dodger</h1>
    <p class="subtitle">Води пальцем по экрану, чтобы управлять машиной. Объезжай встречные автомобили!</p>
    <button class="btn" id="startBtn">Играть</button>
  </div>

  <div id="gameOverScreen">
    <h1>Game Over</h1>
    <p class="subtitle">Ты врезался!</p>
    <div class="final-score" id="finalScore">0</div>
    <p class="best-score" id="bestScore">Лучший: 0</p>
    <button class="btn" id="restartBtn">Ещё раз</button>
  </div>

  <script>
    // ========== SETUP ==========
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const finalScoreEl = document.getElementById('finalScore');
    const bestScoreEl = document.getElementById('bestScore');

    let W, H;
    let scale = 1;

    // Game dimensions (logical)
    const GAME_W = 400;
    const GAME_H = 700;

    function resize() {
      const ratio = GAME_W / GAME_H;
      const winRatio = window.innerWidth / window.innerHeight;

      if (winRatio > ratio) {
        H = Math.min(window.innerHeight, GAME_H);
        W = H * ratio;
      } else {
        W = Math.min(window.innerWidth, GAME_W);
        H = W / ratio;
      }

      scale = W / GAME_W;
      canvas.width = W;
      canvas.height = H;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
    }

    window.addEventListener('resize', resize);
    resize();

    // ========== GAME STATE ==========
    let gameRunning = false;
    let score = 0;
    let bestScore = parseInt(localStorage.getItem('carDodgerBest') || '0');
    let speed = 4;
    let spawnTimer = 0;
    let spawnInterval = 70;
    let roadOffset = 0;
    let frameCount = 0;

    // Road
    const ROAD_LEFT = 50;
    const ROAD_RIGHT = 350;
    const ROAD_W = ROAD_RIGHT - ROAD_LEFT;
    const LANE_COUNT = 3;
    const LANE_W = ROAD_W / LANE_COUNT;

    // Player car
    const CAR_W = 50;
    const CAR_H = 90;
    let playerX = GAME_W / 2;
    let playerY = GAME_H - 150;
    let targetX = playerX;

    // Enemies
    let enemies = [];

    // Particles
    let particles = [];

    // Touch
    let touching = false;
    let touchStartX = 0;
    let touchCurrentX = 0;
    let playerStartX = 0;

    // Colors for enemy cars
    const CAR_COLORS = [
      '#e74c3c', '#2ecc71', '#f39c12', '#9b59b6',
      '#1abc9c', '#e67e22', '#3498db', '#e91e63'
    ];

    // Car body types (different shapes)
    const CAR_TYPES = [
      { wRatio: 1, hRatio: 1, roofOffset: 0.3 },     // sedan
      { wRatio: 1.1, hRatio: 0.85, roofOffset: 0.25 }, // SUV
      { wRatio: 0.9, hRatio: 1.15, roofOffset: 0.35 }, // sports
    ];

    // ========== DRAWING ==========

    function drawRoad() {
      // Road surface
      ctx.fillStyle = '#333';
      ctx.fillRect(ROAD_LEFT * scale, 0, ROAD_W * scale, GAME_H * scale);

      // Road edges
      ctx.fillStyle = '#fff';
      ctx.fillRect((ROAD_LEFT - 3) * scale, 0, 3 * scale, GAME_H * scale);
      ctx.fillRect(ROAD_RIGHT * scale, 0, 3 * scale, GAME_H * scale);

      // Grass left
      ctx.fillStyle = '#2d5a1e';
      ctx.fillRect(0, 0, (ROAD_LEFT - 3) * scale, GAME_H * scale);

      // Grass right
      ctx.fillRect((ROAD_RIGHT + 3) * scale, 0, (GAME_W - ROAD_RIGHT) * scale, GAME_H * scale);

      // Grass texture (small dots)
      ctx.fillStyle = '#3a7a28';
      for (let i = 0; i < 30; i++) {
        const gx = (Math.sin(i * 73.7 + frameCount * 0.01) * 0.5 + 0.5) * (ROAD_LEFT - 10);
        const gy = ((i * 47.3 + roadOffset * 3) % GAME_H);
        ctx.fillRect(gx * scale, gy * scale, 3 * scale, 3 * scale);
      }
      for (let i = 0; i < 30; i++) {
        const gx = ROAD_RIGHT + 8 + (Math.sin(i * 91.3 + frameCount * 0.01) * 0.5 + 0.5) * (GAME_W - ROAD_RIGHT - 15);
        const gy = ((i * 51.7 + roadOffset * 3) % GAME_H);
        ctx.fillRect(gx * scale, gy * scale, 3 * scale, 3 * scale);
      }

      // Lane dashes
      roadOffset = (roadOffset + speed) % 40;
      ctx.fillStyle = '#aaa';
      for (let lane = 1; lane < LANE_COUNT; lane++) {
        const lx = ROAD_LEFT + lane * LANE_W;
        for (let dy = -40 + roadOffset; dy < GAME_H + 40; dy += 40) {
          ctx.fillRect((lx - 1.5) * scale, dy * scale, 3 * scale, 20 * scale);
        }
      }
    }

    function drawCar3D(x, y, w, h, color, isPlayer, type) {
      const cx = x * scale;
      const cy = y * scale;
      const cw = w * scale;
      const ch = h * scale;

      const t = type || CAR_TYPES[0];

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.ellipse(cx + cw / 2, cy + ch + 4 * scale, cw / 2 + 2 * scale, 8 * scale, 0, 0, Math.PI * 2);
      ctx.fill();

      // Main body
      ctx.fillStyle = color;
      const bodyR = 8 * scale;
      roundRect(cx + 2 * scale, cy + ch * 0.15, cw - 4 * scale, ch * 0.75, bodyR);
      ctx.fill();

      // Darker lower body
      ctx.fillStyle = shadeColor(color, -25);
      roundRect(cx + 1 * scale, cy + ch * 0.55, cw - 2 * scale, ch * 0.35, bodyR);
      ctx.fill();

      // Roof / windshield area
      const roofOff = t.roofOffset;
      if (isPlayer) {
        // Player sees from behind - show rear window
        ctx.fillStyle = '#1a2a3a';
        roundRect(cx + 8 * scale, cy + ch * 0.2, cw - 16 * scale, ch * 0.22, 4 * scale);
        ctx.fill();

        // Rear window shine
        ctx.fillStyle = 'rgba(100,180,255,0.15)';
        roundRect(cx + 10 * scale, cy + ch * 0.22, cw - 20 * scale, ch * 0.08, 3 * scale);
        ctx.fill();
      } else {
        // Oncoming - show front windshield
        ctx.fillStyle = '#1a2a3a';
        roundRect(cx + 8 * scale, cy + ch * roofOff, cw - 16 * scale, ch * 0.25, 4 * scale);
        ctx.fill();

        // Windshield shine
        ctx.fillStyle = 'rgba(100,180,255,0.2)';
        roundRect(cx + 10 * scale, cy + ch * roofOff + 2 * scale, (cw - 20 * scale) * 0.6, ch * 0.08, 3 * scale);
        ctx.fill();
      }

      // Headlights / taillights
      if (isPlayer) {
        // Tail lights (red)
        ctx.fillStyle = '#ff2222';
        ctx.shadowColor = '#ff0000';
        ctx.shadowBlur = 6 * scale;
        roundRect(cx + 3 * scale, cy + ch * 0.82, 10 * scale, 6 * scale, 2 * scale);
        ctx.fill();
        roundRect(cx + cw - 13 * scale, cy + ch * 0.82, 10 * scale, 6 * scale, 2 * scale);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Exhaust detail
        ctx.fillStyle = '#555';
        ctx.fillRect(cx + cw / 2 - 8 * scale, cy + ch - 3 * scale, 5 * scale, 3 * scale);
        ctx.fillRect(cx + cw / 2 + 3 * scale, cy + ch - 3 * scale, 5 * scale, 3 * scale);
      } else {
        // Headlights (yellow/white)
        ctx.fillStyle = '#ffffaa';
        ctx.shadowColor = '#ffff00';
        ctx.shadowBlur = 8 * scale;
        roundRect(cx + 3 * scale, cy + ch * 0.78, 10 * scale, 6 * scale, 2 * scale);
        ctx.fill();
        roundRect(cx + cw - 13 * scale, cy + ch * 0.78, 10 * scale, 6 * scale, 2 * scale);
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      // Side mirrors
      ctx.fillStyle = shadeColor(color, -15);
      ctx.fillRect(cx - 3 * scale, cy + ch * 0.3, 5 * scale, 4 * scale);
      ctx.fillRect(cx + cw - 2 * scale, cy + ch * 0.3, 5 * scale, 4 * scale);

      // Wheels
      ctx.fillStyle = '#111';
      // Front wheels
      ctx.fillRect(cx - 1 * scale, cy + ch * 0.18, 5 * scale, 12 * scale);
      ctx.fillRect(cx + cw - 4 * scale, cy + ch * 0.18, 5 * scale, 12 * scale);
      // Rear wheels
      ctx.fillRect(cx - 1 * scale, cy + ch * 0.68, 5 * scale, 12 * scale);
      ctx.fillRect(cx + cw - 4 * scale, cy + ch * 0.68, 5 * scale, 12 * scale);

      // Wheel rims
      ctx.fillStyle = '#444';
      ctx.fillRect(cx, cy + ch * 0.2, 3 * scale, 8 * scale);
      ctx.fillRect(cx + cw - 3 * scale, cy + ch * 0.2, 3 * scale, 8 * scale);
      ctx.fillRect(cx, cy + ch * 0.7, 3 * scale, 8 * scale);
      ctx.fillRect(cx + cw - 3 * scale, cy + ch * 0.7, 3 * scale, 8 * scale);

      // Top highlight
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      roundRect(cx + 4 * scale, cy + ch * 0.16, cw - 8 * scale, ch * 0.15, 4 * scale);
      ctx.fill();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function shadeColor(color, percent) {
      let num = parseInt(color.replace('#', ''), 16);
      let r = Math.min(255, Math.max(0, (num >> 16) + percent));
      let g = Math.min(255, Math.max(0, ((num >> 8) & 0x00FF) + percent));
      let b = Math.min(255, Math.max(0, (num & 0x0000FF) + percent));
      return '#' + (0x1000000 + r * 0x10000 + g * 0x100 + b).toString(16).slice(1);
    }

    function drawScore() {
      // Score background
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      roundRect((GAME_W - 130) * scale, 10 * scale, 120 * scale, 50 * scale, 10 * scale);
      ctx.fill();

      // Score text
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${14 * scale}px 'Segoe UI', Arial, sans-serif`;
      ctx.textAlign = 'right';
      ctx.fillText('Score', (GAME_W - 20) * scale, 30 * scale);

      ctx.fillStyle = '#00c6ff';
      ctx.font = `bold ${22 * scale}px 'Segoe UI', Arial, sans-serif`;
      ctx.fillText(score.toString(), (GAME_W - 20) * scale, 52 * scale);
    }

    function drawSpeedIndicator() {
      const speedLevel = Math.floor((speed - 4) / 0.5) + 1;
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      roundRect(10 * scale, 10 * scale, 90 * scale, 50 * scale, 10 * scale);
      ctx.fill();

      ctx.fillStyle = '#fff';
      ctx.font = `bold ${12 * scale}px 'Segoe UI', Arial, sans-serif`;
      ctx.textAlign = 'left';
      ctx.fillText('Speed', 20 * scale, 30 * scale);

      ctx.fillStyle = speed > 8 ? '#ff4444' : speed > 6 ? '#ffaa00' : '#00ff88';
      ctx.font = `bold ${20 * scale}px 'Segoe UI', Arial, sans-serif`;
      ctx.fillText(speedLevel + 'x', 20 * scale, 52 * scale);
    }

    // ========== PARTICLES ==========

    function spawnExplosion(x, y) {
      for (let i = 0; i < 25; i++) {
        const angle = Math.random() * Math.PI * 2;
        const vel = 1 + Math.random() * 4;
        particles.push({
          x: x,
          y: y,
          vx: Math.cos(angle) * vel,
          vy: Math.sin(angle) * vel,
          life: 40 + Math.random() * 30,
          maxLife: 40 + Math.random() * 30,
          size: 2 + Math.random() * 4,
          color: Math.random() > 0.5 ? '#ff4400' : (Math.random() > 0.5 ? '#ffaa00' : '#ff0000')
        });
      }
      // Smoke
      for (let i = 0; i < 10; i++) {
        const angle = Math.random() * Math.PI * 2;
        const vel = 0.5 + Math.random() * 2;
        particles.push({
          x: x,
          y: y,
          vx: Math.cos(angle) * vel,
          vy: Math.sin(angle) * vel - 1,
          life: 50 + Math.random() * 30,
          maxLife: 50 + Math.random() * 30,
          size: 5 + Math.random() * 8,
          color: '#555'
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.96;
        p.vy *= 0.96;
        p.life--;
        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }
    }

    function drawParticles() {
      for (const p of particles) {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x * scale, p.y * scale, p.size * scale, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // ========== ENEMIES ==========

    function spawnEnemy() {
      const lane = Math.floor(Math.random() * LANE_COUNT);
      const laneCenter = ROAD_LEFT + lane * LANE_W + LANE_W / 2;
      const colorIdx = Math.floor(Math.random() * CAR_COLORS.length);
      const typeIdx = Math.floor(Math.random() * CAR_TYPES.length);
      const enemyW = CAR_W * CAR_TYPES[typeIdx].wRatio;
      const enemyH = CAR_H * CAR_TYPES[typeIdx].hRatio;

      // Check no overlap with existing enemies at spawn
      const tooClose = enemies.some(e => {
        return Math.abs(e.x + e.w / 2 - laneCenter) < LANE_W * 0.8 && e.y < enemyH + 20;
      });
      if (tooClose) return;

      enemies.push({
        x: laneCenter - enemyW / 2,
        y: -enemyH - 10,
        w: enemyW,
        h: enemyH,
        color: CAR_COLORS[colorIdx],
        type: CAR_TYPES[typeIdx],
        scored: false,
        speed: 1 + Math.random() * 1.5
      });
    }

    function updateEnemies() {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.y += speed + e.speed;

        // Score when enemy passes player
        if (!e.scored && e.y > playerY + CAR_H) {
          e.scored = true;
          score++;
        }

        // Remove off-screen
        if (e.y > GAME_H + 50) {
          enemies.splice(i, 1);
        }
      }
    }

    // ========== COLLISION ==========

    function checkCollision() {
      const px = playerX;
      const py = playerY;
      const pw = CAR_W;
      const ph = CAR_H;
      const shrink = 6; // hitbox shrink for fairness

      for (const e of enemies) {
        if (
          px + shrink < e.x + e.w - shrink &&
          px + pw - shrink > e.x + shrink &&
          py + shrink < e.y + e.h - shrink &&
          py + ph - shrink > e.y + shrink
        ) {
          return true;
        }
      }
      return false;
    }

    // ========== INPUT ==========

    function getCanvasX(clientX) {
      const rect = canvas.getBoundingClientRect();
      return (clientX - rect.left) / scale;
    }

    // Touch events
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (!gameRunning) return;
      const touch = e.touches[0];
      touching = true;
      touchStartX = getCanvasX(touch.clientX);
      playerStartX = playerX;
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (!gameRunning || !touching) return;
      const touch = e.touches[0];
      touchCurrentX = getCanvasX(touch.clientX);
      const dx = touchCurrentX - touchStartX;
      targetX = Math.max(ROAD_LEFT + 5, Math.min(ROAD_RIGHT - CAR_W - 5, playerStartX + dx));
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      touching = false;
    }, { passive: false });

    // Mouse events (for desktop)
    let mouseDown = false;

    canvas.addEventListener('mousedown', (e) => {
      if (!gameRunning) return;
      mouseDown = true;
      touchStartX = getCanvasX(e.clientX);
      playerStartX = playerX;
    });

    canvas.addEventListener('mousemove', (e) => {
      if (!gameRunning || !mouseDown) return;
      touchCurrentX = getCanvasX(e.clientX);
      const dx = touchCurrentX - touchStartX;
      targetX = Math.max(ROAD_LEFT + 5, Math.min(ROAD_RIGHT - CAR_W - 5, playerStartX + dx));
    });

    canvas.addEventListener('mouseup', () => {
      mouseDown = false;
    });

    canvas.addEventListener('mouseleave', () => {
      mouseDown = false;
    });

    // Keyboard (arrow keys)
    const keys = {};
    window.addEventListener('keydown', (e) => {
      keys[e.key] = true;
    });
    window.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    function handleKeyboard() {
      const moveSpeed = 5;
      if (keys['ArrowLeft'] || keys['a']) {
        targetX = Math.max(ROAD_LEFT + 5, targetX - moveSpeed);
      }
      if (keys['ArrowRight'] || keys['d']) {
        targetX = Math.min(ROAD_RIGHT - CAR_W - 5, targetX + moveSpeed);
      }
    }

    // ========== GAME LOOP ==========

    function resetGame() {
      score = 0;
      speed = 4;
      spawnTimer = 0;
      spawnInterval = 70;
      frameCount = 0;
      enemies = [];
      particles = [];
      playerX = GAME_W / 2 - CAR_W / 2;
      playerY = GAME_H - 150;
      targetX = playerX;
    }

    function gameOver() {
      gameRunning = false;
      spawnExplosion(playerX + CAR_W / 2, playerY + CAR_H / 2);

      if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('carDodgerBest', bestScore.toString());
      }

      // Show game over after a short delay for explosion effect
      setTimeout(() => {
        finalScoreEl.textContent = score;
        bestScoreEl.textContent = 'Best: ' + bestScore;
        gameOverScreen.style.display = 'flex';
      }, 800);
    }

    let animationId;
    let gameOverTriggered = false;

    function update() {
      if (!gameRunning && particles.length === 0) return;

      frameCount++;

      if (gameRunning) {
        // Smooth movement
        playerX += (targetX - playerX) * 0.15;

        handleKeyboard();

        // Increase difficulty
        if (frameCount % 300 === 0) {
          speed = Math.min(12, speed + 0.3);
          spawnInterval = Math.max(25, spawnInterval - 3);
        }

        // Spawn enemies
        spawnTimer++;
        if (spawnTimer >= spawnInterval) {
          spawnTimer = 0;
          spawnEnemy();
          // Sometimes spawn two at once at higher speeds
          if (speed > 6 && Math.random() < 0.3) {
            spawnEnemy();
          }
        }

        updateEnemies();

        // Check collision
        if (checkCollision()) {
          if (!gameOverTriggered) {
            gameOverTriggered = true;
            gameOver();
          }
        }
      }

      updateParticles();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Background
      ctx.fillStyle = '#1a3a1a';
      ctx.fillRect(0, 0, W, H);

      drawRoad();

      // Draw enemies
      for (const e of enemies) {
        drawCar3D(e.x, e.y, e.w, e.h, e.color, false, e.type);
      }

      // Draw player
      if (gameRunning || particles.length > 0) {
        if (gameRunning) {
          drawCar3D(playerX, playerY, CAR_W, CAR_H, '#0088ff', true);
        }
      }

      drawParticles();

      if (gameRunning) {
        drawScore();
        drawSpeedIndicator();
      }
    }

    function loop() {
      update();
      draw();
      animationId = requestAnimationFrame(loop);
    }

    // ========== START / RESTART ==========

    function startGame() {
      resetGame();
      gameRunning = true;
      gameOverTriggered = false;
      startScreen.style.display = 'none';
      gameOverScreen.style.display = 'none';
    }

    startBtn.addEventListener('click', () => {
      startGame();
    });

    startBtn.addEventListener('touchend', (e) => {
      e.preventDefault();
      startGame();
    });

    restartBtn.addEventListener('click', () => {
      startGame();
    });

    restartBtn.addEventListener('touchend', (e) => {
      e.preventDefault();
      startGame();
    });

    // Initial draw
    loop();
  </script>
</body>
</html>

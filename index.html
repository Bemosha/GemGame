<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Поймай со стола!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    canvas { display: block; border-radius: 4px; }

    .overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      z-index: 10; color: #fff; text-align: center; padding: 20px;
    }
    #startScreen { background: rgba(0,0,0,0.88); }
    #gameOverScreen { background: rgba(0,0,0,0.88); display: none; }

    h1 { font-size: 32px; margin-bottom: 10px; }
    .emoji-title { font-size: 50px; margin-bottom: 10px; }
    .subtitle { font-size: 15px; color: #bbb; margin-bottom: 24px; max-width: 300px; line-height: 1.5; }
    .btn {
      background: linear-gradient(135deg, #ff6b35, #ff9f1c);
      color: #fff; border: none; padding: 14px 40px; font-size: 18px;
      border-radius: 30px; cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,107,53,0.4);
      transition: transform 0.2s;
    }
    .btn:active { transform: scale(0.95); }
    .final-score { font-size: 60px; font-weight: bold; color: #ff9f1c; margin: 10px 0 6px; }
    .best-score { font-size: 16px; color: #888; margin-bottom: 24px; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <div class="overlay" id="startScreen">
    <div class="emoji-title">🥣🥛🍽️</div>
    <h1>Поймай со стола!</h1>
    <p class="subtitle">Предметы падают со стола! Лови их пальцем и ставь обратно. Игра ускоряется с каждым пойманным предметом!</p>
    <button class="btn" id="startBtn">Играть!</button>
  </div>

  <div class="overlay" id="gameOverScreen">
    <div class="emoji-title">💥</div>
    <h1>Разбилось!</h1>
    <p class="subtitle">Ты не успел поймать предмет</p>
    <div class="final-score" id="finalScore">0</div>
    <p class="best-score" id="bestScore">Лучший: 0</p>
    <button class="btn" id="restartBtn">Ещё раз!</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const finalScoreEl = document.getElementById('finalScore');
    const bestScoreEl = document.getElementById('bestScore');

    // Logical game size
    const GW = 400, GH = 700;
    let W, H, sc = 1;

    function resize() {
      const r = GW / GH, wr = window.innerWidth / window.innerHeight;
      if (wr > r) { H = Math.min(window.innerHeight, GH); W = H * r; }
      else { W = Math.min(window.innerWidth, GW); H = W / r; }
      sc = W / GW;
      canvas.width = W; canvas.height = H;
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    }
    window.addEventListener('resize', resize);
    resize();

    // ===== ITEMS DEFINITIONS =====
    const ITEM_DEFS = [
      { name: 'cereal',  emoji: '🥣', label: 'Хлопья',   w: 55, h: 60, color: '#d4a030', drawFn: drawCerealBox },
      { name: 'milk',    emoji: '🥛', label: 'Молоко',    w: 40, h: 65, color: '#e8e8f0', drawFn: drawMilkCarton },
      { name: 'cloth',   emoji: '🧹', label: 'Тряпка',    w: 55, h: 30, color: '#5ba3cf', drawFn: drawCloth },
      { name: 'plate',   emoji: '🍽️', label: 'Тарелка',  w: 60, h: 20, color: '#f0f0f0', drawFn: drawPlate },
      { name: 'cup',     emoji: '☕', label: 'Чашка',     w: 35, h: 40, color: '#e07040', drawFn: drawCup },
      { name: 'bowl',    emoji: '🥗', label: 'Миска',     w: 50, h: 25, color: '#c0d0a0', drawFn: drawBowl },
      { name: 'spoon',   emoji: '🥄', label: 'Ложка',     w: 15, h: 55, color: '#c0c0c0', drawFn: drawSpoon },
      { name: 'glass',   emoji: '🥃', label: 'Стакан',    w: 30, h: 50, color: '#a0d8ef', drawFn: drawGlass },
    ];

    // ===== DRAW FUNCTIONS FOR ITEMS =====

    function drawCerealBox(x, y, w, h, s) {
      // Box
      ctx.fillStyle = '#c8860a';
      roundRect(x * s, y * s, w * s, h * s, 4 * s); ctx.fill();
      // Front face
      ctx.fillStyle = '#e6a817';
      roundRect((x + 3) * s, (y + 3) * s, (w - 6) * s, (h - 6) * s, 3 * s); ctx.fill();
      // Label
      ctx.fillStyle = '#8b1a1a';
      ctx.font = `bold ${9 * s}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText('Любятово', (x + w / 2) * s, (y + h / 2 - 4) * s);
      ctx.fillStyle = '#fff';
      ctx.font = `${7 * s}px Arial`;
      ctx.fillText('Хлопья', (x + w / 2) * s, (y + h / 2 + 6) * s);
      // Top flap
      ctx.fillStyle = '#a07008';
      ctx.fillRect((x + 5) * s, y * s, (w - 10) * s, 6 * s);
    }

    function drawMilkCarton(x, y, w, h, s) {
      // Carton body
      ctx.fillStyle = '#e0e8f5';
      roundRect(x * s, (y + 8) * s, w * s, (h - 8) * s, 3 * s); ctx.fill();
      // Top triangle
      ctx.fillStyle = '#c0c8e0';
      ctx.beginPath();
      ctx.moveTo(x * s, (y + 8) * s);
      ctx.lineTo((x + w / 2) * s, y * s);
      ctx.lineTo((x + w) * s, (y + 8) * s);
      ctx.closePath(); ctx.fill();
      // Label
      ctx.fillStyle = '#2060c0';
      ctx.font = `bold ${8 * s}px Arial`;
      ctx.textAlign = 'center';
      ctx.fillText('Молоко', (x + w / 2) * s, (y + h / 2 + 6) * s);
      // Blue stripe
      ctx.fillStyle = '#3070d0';
      ctx.fillRect((x + 3) * s, (y + h / 2 - 8) * s, (w - 6) * s, 4 * s);
    }

    function drawCloth(x, y, w, h, s) {
      // Crumpled cloth shape
      ctx.fillStyle = '#4a90c0';
      ctx.beginPath();
      ctx.moveTo((x + 5) * s, (y + h) * s);
      ctx.quadraticCurveTo((x) * s, (y + h / 2) * s, (x + 8) * s, y * s);
      ctx.lineTo((x + w / 2) * s, (y + 4) * s);
      ctx.quadraticCurveTo((x + w / 2 + 5) * s, (y - 2) * s, (x + w - 5) * s, (y + 2) * s);
      ctx.quadraticCurveTo((x + w + 2) * s, (y + h / 2) * s, (x + w - 3) * s, (y + h) * s);
      ctx.closePath(); ctx.fill();
      // Texture lines
      ctx.strokeStyle = '#3a7aa8';
      ctx.lineWidth = 1 * s;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo((x + 10 + i * 14) * s, (y + 3) * s);
        ctx.lineTo((x + 7 + i * 14) * s, (y + h - 2) * s);
        ctx.stroke();
      }
    }

    function drawPlate(x, y, w, h, s) {
      // Plate from above (perspective - ellipse)
      ctx.fillStyle = '#e8e8e8';
      ctx.beginPath();
      ctx.ellipse((x + w / 2) * s, (y + h / 2) * s, (w / 2) * s, (h / 2) * s, 0, 0, Math.PI * 2);
      ctx.fill();
      // Inner ring
      ctx.strokeStyle = '#ccc';
      ctx.lineWidth = 1.5 * s;
      ctx.beginPath();
      ctx.ellipse((x + w / 2) * s, (y + h / 2) * s, (w / 2 - 6) * s, (h / 2 - 3) * s, 0, 0, Math.PI * 2);
      ctx.stroke();
      // Shine
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.ellipse((x + w / 2 - 5) * s, (y + h / 2 - 2) * s, 8 * s, 3 * s, -0.3, 0, Math.PI * 2);
      ctx.fill();
      // Rim
      ctx.strokeStyle = '#bbb';
      ctx.lineWidth = 2 * s;
      ctx.beginPath();
      ctx.ellipse((x + w / 2) * s, (y + h / 2) * s, (w / 2) * s, (h / 2) * s, 0, 0, Math.PI * 2);
      ctx.stroke();
    }

    function drawCup(x, y, w, h, s) {
      // Cup body
      ctx.fillStyle = '#cc5533';
      roundRect(x * s, y * s, w * s, h * s, 3 * s); ctx.fill();
      // Handle
      ctx.strokeStyle = '#cc5533';
      ctx.lineWidth = 3 * s;
      ctx.beginPath();
      ctx.arc((x + w + 4) * s, (y + h / 2) * s, 7 * s, -Math.PI / 2, Math.PI / 2);
      ctx.stroke();
      // Coffee inside
      ctx.fillStyle = '#3a1a0a';
      ctx.beginPath();
      ctx.ellipse((x + w / 2) * s, (y + 4) * s, (w / 2 - 3) * s, 5 * s, 0, 0, Math.PI * 2);
      ctx.fill();
      // Steam
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 1.5 * s;
      for (let i = 0; i < 2; i++) {
        ctx.beginPath();
        ctx.moveTo((x + w / 3 + i * w / 3) * s, (y - 2) * s);
        ctx.quadraticCurveTo((x + w / 3 + i * w / 3 + 3) * s, (y - 8) * s, (x + w / 3 + i * w / 3) * s, (y - 14) * s);
        ctx.stroke();
      }
    }

    function drawBowl(x, y, w, h, s) {
      // Bowl body
      ctx.fillStyle = '#a8c070';
      ctx.beginPath();
      ctx.ellipse((x + w / 2) * s, (y + h / 2) * s, (w / 2) * s, (h / 2 + 4) * s, 0, 0, Math.PI);
      ctx.closePath(); ctx.fill();
      // Rim
      ctx.fillStyle = '#90a860';
      ctx.beginPath();
      ctx.ellipse((x + w / 2) * s, (y + h / 2) * s, (w / 2) * s, (h / 3) * s, 0, 0, Math.PI * 2);
      ctx.fill();
      // Inside
      ctx.fillStyle = '#c8e0a0';
      ctx.beginPath();
      ctx.ellipse((x + w / 2) * s, (y + h / 2) * s, (w / 2 - 4) * s, (h / 3 - 2) * s, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawSpoon(x, y, w, h, s) {
      // Handle
      ctx.fillStyle = '#b0b0b0';
      roundRect((x + w / 2 - 2) * s, (y + 15) * s, 4 * s, (h - 15) * s, 2 * s); ctx.fill();
      // Spoon head
      ctx.fillStyle = '#c8c8c8';
      ctx.beginPath();
      ctx.ellipse((x + w / 2) * s, (y + 9) * s, (w / 2) * s, 9 * s, 0, 0, Math.PI * 2);
      ctx.fill();
      // Shine
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.ellipse((x + w / 2 - 1) * s, (y + 7) * s, 3 * s, 4 * s, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawGlass(x, y, w, h, s) {
      // Glass body (slightly tapered)
      ctx.fillStyle = 'rgba(160,216,239,0.5)';
      ctx.beginPath();
      ctx.moveTo((x + 3) * s, y * s);
      ctx.lineTo((x) * s, (y + h) * s);
      ctx.lineTo((x + w) * s, (y + h) * s);
      ctx.lineTo((x + w - 3) * s, y * s);
      ctx.closePath(); ctx.fill();
      // Water
      ctx.fillStyle = 'rgba(80,160,220,0.4)';
      ctx.beginPath();
      ctx.moveTo((x + 2) * s, (y + h * 0.3) * s);
      ctx.lineTo((x) * s, (y + h) * s);
      ctx.lineTo((x + w) * s, (y + h) * s);
      ctx.lineTo((x + w - 2) * s, (y + h * 0.3) * s);
      ctx.closePath(); ctx.fill();
      // Shine
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect((x + 4) * s, (y + 4) * s, 3 * s, (h - 10) * s);
      // Rim
      ctx.strokeStyle = 'rgba(200,230,255,0.6)';
      ctx.lineWidth = 1.5 * s;
      ctx.beginPath();
      ctx.moveTo((x + 3) * s, y * s);
      ctx.lineTo((x + w - 3) * s, y * s);
      ctx.stroke();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    // ===== GAME STATE =====
    let gameRunning = false;
    let score = 0;
    let bestScore = parseInt(localStorage.getItem('tableCatchBest') || '0');
    let gameSpeed = 1;
    let items = [];         // items on the table (stable)
    let fallingItem = null; // currently falling
    let caughtItem = null;  // caught by player
    let catchOffsetX = 0, catchOffsetY = 0;
    let particles = [];
    let shakeTimer = 0;
    let nextFallTimer = 0;
    let fallDelay = 180; // frames between falls
    let warningTimer = 0;
    let warningItem = null;
    let combo = 0;
    let comboTexts = [];

    // Table
    const TABLE_Y = 360;
    const TABLE_H = 340;
    const TABLE_TOP = TABLE_Y;

    // Slots on table for items
    const SLOTS = [
      { x: 30,  y: TABLE_Y + 20 },
      { x: 110, y: TABLE_Y + 15 },
      { x: 200, y: TABLE_Y + 25 },
      { x: 290, y: TABLE_Y + 18 },
      { x: 60,  y: TABLE_Y + 90 },
      { x: 170, y: TABLE_Y + 95 },
      { x: 280, y: TABLE_Y + 85 },
      { x: 120, y: TABLE_Y + 155 },
    ];

    function initItems() {
      items = [];
      for (let i = 0; i < ITEM_DEFS.length; i++) {
        const def = ITEM_DEFS[i];
        const slot = SLOTS[i];
        items.push({
          def: def,
          x: slot.x,
          y: slot.y,
          homeX: slot.x,
          homeY: slot.y,
          state: 'stable', // stable, warning, falling, caught, returning
          vy: 0,
          vx: 0,
          wobble: 0,
          wobbleSpeed: 0,
          fallProgress: 0,
          returnProgress: 0,
        });
      }
    }

    function resetGame() {
      score = 0;
      gameSpeed = 1;
      fallingItem = null;
      caughtItem = null;
      particles = [];
      comboTexts = [];
      shakeTimer = 0;
      nextFallTimer = 90;
      fallDelay = 180;
      combo = 0;
      warningItem = null;
      warningTimer = 0;
      initItems();
    }

    // ===== TABLE DRAWING =====

    function drawBackground() {
      // Wall
      const wallGrad = ctx.createLinearGradient(0, 0, 0, TABLE_Y * sc);
      wallGrad.addColorStop(0, '#3a2a1a');
      wallGrad.addColorStop(1, '#5a4030');
      ctx.fillStyle = wallGrad;
      ctx.fillRect(0, 0, GW * sc, TABLE_Y * sc);

      // Wall texture (subtle)
      ctx.fillStyle = 'rgba(0,0,0,0.03)';
      for (let i = 0; i < 20; i++) {
        const bx = (i % 5) * 85;
        const by = Math.floor(i / 5) * 95;
        ctx.fillRect(bx * sc, by * sc, 80 * sc, 90 * sc);
      }

      // Window hint
      ctx.fillStyle = 'rgba(100,150,200,0.08)';
      roundRect(140 * sc, 30 * sc, 120 * sc, 100 * sc, 5 * sc); ctx.fill();
      ctx.strokeStyle = 'rgba(200,200,200,0.1)';
      ctx.lineWidth = 2 * sc;
      roundRect(140 * sc, 30 * sc, 120 * sc, 100 * sc, 5 * sc); ctx.stroke();
    }

    function drawTable() {
      // Table surface (perspective - trapezoidal)
      const tGrad = ctx.createLinearGradient(0, TABLE_Y * sc, 0, GH * sc);
      tGrad.addColorStop(0, '#8B6914');
      tGrad.addColorStop(0.3, '#a07828');
      tGrad.addColorStop(1, '#6a5010');
      ctx.fillStyle = tGrad;
      ctx.beginPath();
      ctx.moveTo(0, TABLE_Y * sc);
      ctx.lineTo(GW * sc, TABLE_Y * sc);
      ctx.lineTo(GW * sc, GH * sc);
      ctx.lineTo(0, GH * sc);
      ctx.closePath();
      ctx.fill();

      // Table edge highlight
      ctx.fillStyle = '#b08830';
      ctx.fillRect(0, TABLE_Y * sc, GW * sc, 4 * sc);

      // Wood grain
      ctx.strokeStyle = 'rgba(0,0,0,0.06)';
      ctx.lineWidth = 1 * sc;
      for (let i = 0; i < 8; i++) {
        const gy = TABLE_Y + 30 + i * 42;
        ctx.beginPath();
        ctx.moveTo(0, gy * sc);
        for (let gx = 0; gx < GW; gx += 20) {
          ctx.lineTo(gx * sc, (gy + Math.sin(gx * 0.05 + i) * 3) * sc);
        }
        ctx.stroke();
      }

      // Tablecloth / runner
      ctx.fillStyle = 'rgba(180,60,60,0.15)';
      ctx.fillRect(150 * sc, TABLE_Y * sc, 100 * sc, TABLE_H * sc);
    }

    // ===== DRAWING HUD =====

    function drawHUD() {
      // Score
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      roundRect((GW - 130) * sc, 10 * sc, 120 * sc, 55 * sc, 10 * sc); ctx.fill();

      ctx.fillStyle = '#fff';
      ctx.font = `bold ${12 * sc}px Arial`;
      ctx.textAlign = 'right';
      ctx.fillText('Поймано', (GW - 20) * sc, 30 * sc);

      ctx.fillStyle = '#ff9f1c';
      ctx.font = `bold ${24 * sc}px Arial`;
      ctx.fillText(score.toString(), (GW - 20) * sc, 55 * sc);

      // Speed
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      roundRect(10 * sc, 10 * sc, 100 * sc, 55 * sc, 10 * sc); ctx.fill();

      ctx.fillStyle = '#fff';
      ctx.font = `bold ${12 * sc}px Arial`;
      ctx.textAlign = 'left';
      ctx.fillText('Скорость', 22 * sc, 30 * sc);

      const spLvl = Math.floor(gameSpeed * 10) / 10;
      ctx.fillStyle = gameSpeed > 2.5 ? '#ff4444' : gameSpeed > 1.5 ? '#ffaa00' : '#00ff88';
      ctx.font = `bold ${22 * sc}px Arial`;
      ctx.fillText(spLvl + 'x', 22 * sc, 55 * sc);
    }

    // ===== COMBO TEXT =====

    function addComboText(x, y, text, color) {
      comboTexts.push({ x, y, text, color, life: 60, maxLife: 60 });
    }

    function updateComboTexts() {
      for (let i = comboTexts.length - 1; i >= 0; i--) {
        comboTexts[i].y -= 0.8;
        comboTexts[i].life--;
        if (comboTexts[i].life <= 0) comboTexts.splice(i, 1);
      }
    }

    function drawComboTexts() {
      for (const ct of comboTexts) {
        const alpha = ct.life / ct.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = ct.color;
        ctx.font = `bold ${18 * sc}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(ct.text, ct.x * sc, ct.y * sc);
      }
      ctx.globalAlpha = 1;
    }

    // ===== PARTICLES =====

    function spawnCatchParticles(x, y) {
      for (let i = 0; i < 12; i++) {
        const a = Math.random() * Math.PI * 2;
        const v = 1 + Math.random() * 3;
        particles.push({
          x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v,
          life: 25 + Math.random() * 15, maxLife: 25 + Math.random() * 15,
          size: 2 + Math.random() * 3,
          color: ['#ffdd44', '#ff9f1c', '#ffee88'][Math.floor(Math.random() * 3)]
        });
      }
    }

    function spawnBreakParticles(x, y) {
      for (let i = 0; i < 20; i++) {
        const a = Math.random() * Math.PI * 2;
        const v = 2 + Math.random() * 5;
        particles.push({
          x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v - 2,
          life: 40 + Math.random() * 20, maxLife: 40 + Math.random() * 20,
          size: 2 + Math.random() * 5,
          color: ['#ff3300', '#ff6600', '#880000', '#555'][Math.floor(Math.random() * 4)]
        });
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vy += 0.1;
        p.vx *= 0.97;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x * sc, p.y * sc, p.size * sc, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // ===== INPUT =====

    let touchActive = false;

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: (clientX - rect.left) / sc, y: (clientY - rect.top) / sc };
    }

    function onDown(e) {
      e.preventDefault();
      if (!gameRunning) return;
      const pos = getPos(e);
      touchActive = true;

      // Check if touching the falling item
      if (fallingItem && fallingItem.state === 'falling') {
        const it = fallingItem;
        const ix = it.x, iy = it.y;
        const iw = it.def.w, ih = it.def.h;
        // Generous hit area
        if (pos.x > ix - 15 && pos.x < ix + iw + 15 && pos.y > iy - 15 && pos.y < iy + ih + 15) {
          it.state = 'caught';
          caughtItem = it;
          catchOffsetX = ix - pos.x;
          catchOffsetY = iy - pos.y;
          spawnCatchParticles(ix + iw / 2, iy + ih / 2);
        }
      }
    }

    function onMove(e) {
      e.preventDefault();
      if (!gameRunning || !touchActive || !caughtItem) return;
      const pos = getPos(e);
      caughtItem.x = pos.x + catchOffsetX;
      caughtItem.y = pos.y + catchOffsetY;
    }

    function onUp(e) {
      e.preventDefault();
      touchActive = false;
      if (!gameRunning || !caughtItem) return;

      const it = caughtItem;
      // Check if placed near home position
      const dx = it.x - it.homeX;
      const dy = it.y - it.homeY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 60) {
        // Success! Placed back
        it.x = it.homeX;
        it.y = it.homeY;
        it.state = 'stable';
        fallingItem = null;
        caughtItem = null;
        score++;
        combo++;
        gameSpeed = 1 + score * 0.08;
        fallDelay = Math.max(40, 180 - score * 8);
        nextFallTimer = fallDelay;

        const comboText = combo >= 5 ? 'СУПЕР x' + combo + '!' : combo >= 3 ? 'Комбо x' + combo + '!' : '+1';
        const comboColor = combo >= 5 ? '#ff3333' : combo >= 3 ? '#ff9f1c' : '#ffdd44';
        addComboText(it.homeX + it.def.w / 2, it.homeY - 10, comboText, comboColor);
        spawnCatchParticles(it.homeX + it.def.w / 2, it.homeY + it.def.h / 2);
      } else {
        // Dropped it! - let it fall again
        it.state = 'falling';
        it.vy = 0;
        caughtItem = null;
        combo = 0;
      }
    }

    canvas.addEventListener('touchstart', onDown, { passive: false });
    canvas.addEventListener('touchmove', onMove, { passive: false });
    canvas.addEventListener('touchend', onUp, { passive: false });
    canvas.addEventListener('mousedown', onDown);
    canvas.addEventListener('mousemove', onMove);
    canvas.addEventListener('mouseup', onUp);
    canvas.addEventListener('mouseleave', (e) => { if (touchActive) onUp(e); });

    // ===== GAME LOGIC =====

    function pickRandomStableItem() {
      const stable = items.filter(it => it.state === 'stable');
      if (stable.length === 0) return null;
      return stable[Math.floor(Math.random() * stable.length)];
    }

    function startItemFall(item) {
      // First show warning wobble
      item.state = 'warning';
      item.wobble = 0;
      item.wobbleSpeed = 0.3;
      warningItem = item;
      warningTimer = Math.max(20, 50 - score * 2); // warning gets shorter over time
    }

    function triggerFall(item) {
      item.state = 'falling';
      item.vy = 0;
      item.vx = (Math.random() - 0.5) * 2;
      fallingItem = item;
      warningItem = null;
    }

    function update() {
      if (!gameRunning) {
        updateParticles();
        return;
      }

      // Warning wobble
      if (warningItem) {
        warningTimer--;
        warningItem.wobble = Math.sin(warningTimer * warningItem.wobbleSpeed) * 4;
        if (warningTimer <= 0) {
          triggerFall(warningItem);
        }
      }

      // Falling physics
      if (fallingItem && fallingItem.state === 'falling') {
        fallingItem.vy += 0.15 * gameSpeed;
        fallingItem.y += fallingItem.vy;
        fallingItem.x += fallingItem.vx;

        // Fell off screen = game over
        if (fallingItem.y > GH + 20) {
          spawnBreakParticles(fallingItem.x + fallingItem.def.w / 2, GH - 20);
          shakeTimer = 15;
          gameRunning = false;
          combo = 0;

          if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('tableCatchBest', bestScore.toString());
          }

          setTimeout(() => {
            finalScoreEl.textContent = score;
            bestScoreEl.textContent = 'Лучший: ' + bestScore;
            gameOverScreen.style.display = 'flex';
          }, 600);
        }
      }

      // Timer for next fall
      if (!fallingItem && !warningItem) {
        nextFallTimer--;
        if (nextFallTimer <= 0) {
          const item = pickRandomStableItem();
          if (item) startItemFall(item);
          nextFallTimer = fallDelay;
        }
      }

      // Screen shake
      if (shakeTimer > 0) shakeTimer--;

      updateParticles();
      updateComboTexts();
    }

    function draw() {
      ctx.save();

      // Screen shake
      if (shakeTimer > 0) {
        const sx = (Math.random() - 0.5) * shakeTimer * 0.8;
        const sy = (Math.random() - 0.5) * shakeTimer * 0.8;
        ctx.translate(sx * sc, sy * sc);
      }

      ctx.clearRect(-10, -10, GW * sc + 20, GH * sc + 20);

      drawBackground();
      drawTable();

      // Draw items
      for (const it of items) {
        if (it.state === 'stable') {
          it.def.drawFn(it.x, it.y, it.def.w, it.def.h, sc);
        } else if (it.state === 'warning') {
          it.def.drawFn(it.x + it.wobble, it.y, it.def.w, it.def.h, sc);
          // Warning indicator
          ctx.fillStyle = 'rgba(255,50,50,0.7)';
          ctx.font = `bold ${16 * sc}px Arial`;
          ctx.textAlign = 'center';
          ctx.fillText('⚠️', (it.x + it.wobble + it.def.w / 2) * sc, (it.y - 12) * sc);
        } else if (it.state === 'falling' || it.state === 'caught') {
          // Shadow on table
          ctx.fillStyle = 'rgba(0,0,0,0.15)';
          ctx.beginPath();
          ctx.ellipse((it.homeX + it.def.w / 2) * sc, (it.homeY + it.def.h / 2) * sc,
            it.def.w / 2 * sc, 6 * sc, 0, 0, Math.PI * 2);
          ctx.fill();

          // Ghost outline on home position
          ctx.strokeStyle = 'rgba(255,255,255,0.2)';
          ctx.lineWidth = 2 * sc;
          ctx.setLineDash([4 * sc, 4 * sc]);
          ctx.strokeRect(it.homeX * sc, it.homeY * sc, it.def.w * sc, it.def.h * sc);
          ctx.setLineDash([]);

          // Draw the item at current position
          it.def.drawFn(it.x, it.y, it.def.w, it.def.h, sc);

          // Glow if caught
          if (it.state === 'caught') {
            ctx.shadowColor = '#ff9f1c';
            ctx.shadowBlur = 15 * sc;
            ctx.fillStyle = 'rgba(255,159,28,0.1)';
            ctx.fillRect(it.x * sc, it.y * sc, it.def.w * sc, it.def.h * sc);
            ctx.shadowBlur = 0;
          }
        }
      }

      drawParticles();
      drawComboTexts();

      if (gameRunning) drawHUD();

      ctx.restore();
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    // ===== START =====

    function startGame() {
      resetGame();
      gameRunning = true;
      startScreen.style.display = 'none';
      gameOverScreen.style.display = 'none';
    }

    document.getElementById('startBtn').addEventListener('click', (e) => { e.preventDefault(); startGame(); });
    document.getElementById('startBtn').addEventListener('touchend', (e) => { e.preventDefault(); startGame(); });
    document.getElementById('restartBtn').addEventListener('click', (e) => { e.preventDefault(); startGame(); });
    document.getElementById('restartBtn').addEventListener('touchend', (e) => { e.preventDefault(); startGame(); });

    loop();
  </script>
</body>
</html>
